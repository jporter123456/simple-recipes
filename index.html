<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just the Recipe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #faf8f4;
–surface: #ffffff;
–border: #e8e2d9;
–text: #1a1a18;
–muted: #7a7469;
–accent: #b85c1a;
–tag-bg: #f0ece4;
–af-bg: #fff8e7;
–af-border: #e8c97a;
}

body {
font-family: ‘Source Sans 3’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
font-size: 16px;
line-height: 1.6;
}

/* INTRO BANNER */
.intro-banner {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 18px 24px;
font-size: 0.88rem;
color: var(–muted);
line-height: 1.7;
}

.intro-banner strong { color: var(–text); font-weight: 600; }

/* HEADER */
header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 20px 24px 16px;
position: sticky;
top: 0;
z-index: 100;
}

.header-top {
display: flex;
align-items: baseline;
gap: 12px;
margin-bottom: 14px;
}

h1 {
font-family: ‘Playfair Display’, serif;
font-size: 1.7rem;
font-weight: 700;
letter-spacing: -0.02em;
color: var(–text);
}

.subtitle {
font-size: 0.82rem;
color: var(–muted);
font-weight: 300;
}

/* CONTROLS */
.controls {
display: flex;
flex-wrap: wrap;
gap: 10px;
align-items: center;
}

.search-wrap {
position: relative;
flex: 1;
min-width: 180px;
max-width: 360px;
}

.search-wrap svg {
position: absolute;
left: 10px;
top: 50%;
transform: translateY(-50%);
color: var(–muted);
pointer-events: none;
}

#search {
width: 100%;
padding: 8px 12px 8px 34px;
border: 1px solid var(–border);
border-radius: 6px;
background: var(–bg);
font-family: inherit;
font-size: 0.9rem;
color: var(–text);
outline: none;
transition: border-color .15s;
}

#search:focus { border-color: var(–accent); }

.tags-wrap {
display: flex;
flex-wrap: wrap;
gap: 6px;
}

.tag-btn {
font-family: inherit;
font-size: 0.78rem;
padding: 4px 10px;
border: 1px solid var(–border);
border-radius: 20px;
background: var(–bg);
color: var(–muted);
cursor: pointer;
transition: all .15s;
white-space: nowrap;
}

.tag-btn:hover { border-color: var(–accent); color: var(–accent); }
.tag-btn.active { background: var(–accent); border-color: var(–accent); color: #fff; }

/* RECIPE COUNT */
.results-bar {
padding: 10px 24px 0;
font-size: 0.8rem;
color: var(–muted);
}

/* RECIPE GRID */
main {
padding: 16px 24px 40px;
display: grid;
grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 16px;
}

.recipe-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 18px 20px;
display: flex;
flex-direction: column;
gap: 12px;
transition: box-shadow .15s;
}

.recipe-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); }

.recipe-card.hidden { display: none; }

.recipe-title {
font-family: ‘Playfair Display’, serif;
font-size: 1.05rem;
font-weight: 700;
line-height: 1.3;
color: var(–text);
}

/* COOK TIMES */
.cook-times {
display: flex;
flex-direction: column;
gap: 4px;
}

.time-row {
display: flex;
align-items: baseline;
gap: 8px;
font-size: 0.83rem;
}

.time-method {
font-weight: 600;
min-width: 82px;
color: var(–muted);
font-size: 0.78rem;
text-transform: uppercase;
letter-spacing: .04em;
}

.time-detail { color: var(–text); }

.time-row.af-row {
background: var(–af-bg);
border: 1px solid var(–af-border);
border-radius: 5px;
padding: 4px 8px;
}

.time-row.af-row .time-method { color: #9a6b10; }
.time-row.af-row .time-detail { color: #5a3d08; font-weight: 600; }

/* Ingredients */
.ingredients h4, .instructions h4 {
font-size: 0.72rem;
text-transform: uppercase;
letter-spacing: .07em;
color: var(–muted);
margin-bottom: 5px;
font-weight: 600;
}

.ingredients ul {
list-style: none;
display: flex;
flex-direction: column;
gap: 2px;
}

.ingredients ul li {
font-size: 0.87rem;
display: flex;
gap: 6px;
}

.ingredients ul li::before {
content: ‘·’;
color: var(–accent);
font-weight: 700;
}

.ing-amount { font-weight: 600; white-space: nowrap; }

.scale-row {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 6px;
}

.scale-label { font-size: 0.75rem; color: var(–muted); }

.scale-btn {
width: 26px;
height: 26px;
border: 1px solid var(–border);
border-radius: 50%;
background: var(–bg);
font-size: 1rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
color: var(–text);
line-height: 1;
transition: all .12s;
font-family: inherit;
}

.scale-btn:hover { border-color: var(–accent); color: var(–accent); }

.scale-display {
font-size: 0.85rem;
font-weight: 600;
min-width: 50px;
text-align: center;
color: var(–text);
}

/* Instructions */
.instructions ol {
padding-left: 18px;
display: flex;
flex-direction: column;
gap: 4px;
}

.instructions ol li { font-size: 0.87rem; }

/* Tags */
.recipe-tags {
display: flex;
flex-wrap: wrap;
gap: 4px;
margin-top: 2px;
}

.recipe-tag {
font-size: 0.73rem;
background: var(–tag-bg);
color: var(–muted);
padding: 2px 8px;
border-radius: 20px;
}

/* No results */
.no-results {
grid-column: 1/-1;
text-align: center;
padding: 60px 20px;
color: var(–muted);
font-size: 1rem;
display: none;
}

.no-results.visible { display: block; }

/* PRINT */
@media print {
header, .results-bar, .scale-row { display: none !important; }
body { background: #fff; font-size: 11pt; }
main { display: block; padding: 0; }
.recipe-card {
break-inside: avoid;
border: 1px solid #ccc;
margin-bottom: 16px;
box-shadow: none;
padding: 12px;
}
.recipe-card.hidden { display: none !important; }
.recipe-tags { display: none; }
.time-row.af-row { background: #fff8e7; -webkit-print-color-adjust: exact; }
}

@media (max-width: 480px) {
header { padding: 14px 16px 12px; }
main { padding: 12px 16px 32px; }
.results-bar { padding: 8px 16px 0; }
}
</style>

</head>

      { amount: "½ cup", item: "silken tofu, cubed" },
      { amount: "2 tbsp", item: "dried wakame seaweed" },
      { amount: "2", item: "green onions, sliced" }
    ],
    steps: ["Bring water to near boil — do not boil.", "Whisk in miso until dissolved.", "Add tofu + wakame; heat 2 min.", "Top with green onion."],
    tags: ["Vegan", "Quick (under 10 min)"]
  },
  {
    title: "Fried Plantains (Tostones)",
    times: [
      { method: "Stovetop", detail: "15 min" },
      { method: "Air Fryer", detail: "375°F – 12 min", af: true }
    ],
    ingredients: [
      { amount: "2", item: "green plantains, peeled & sliced 1-inch" },
      { amount: "2 tbsp", item: "oil" },
      { amount: "", item: "Salt" }
    ],
    steps: ["Fry/air fry slices until golden; flatten each with a glass.", "Fry/air fry again until crispy.", "Season with salt immediately."],
    tags: ["Vegan", "Gluten-Free"]
  }

  // ─────────────────────────────────────────────────────────────
  // TO ADD MORE RECIPES — paste above this line using this format:
  // ,{
  //   title: "Recipe Name",
  //   times: [ { method: "...", detail: "...", af: true } ],
  //   ingredients: [ { amount: "...", item: "..." } ],
  //   steps: ["Step 1.", "Step 2."],
  //   tags: ["Tag1", "Tag2"]
  // }
  // ─────────────────────────────────────────────────────────────
];

// Collect all unique tags
const allTags = [...new Set(RECIPES.flatMap(r => r.tags))].sort();

// State
let activeTag = null;
let searchQuery = '';
const scales = {}; // per-recipe scale multipliers

function buildTagFilters() {
  const wrap = document.getElementById('tagFilters');
  allTags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = tag;
    btn.dataset.tag = tag;
    btn.onclick = () => {
      if (activeTag === tag) { activeTag = null; btn.classList.remove('active'); }
      else {
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        activeTag = tag;
        btn.classList.add('active');
      }
      filterRecipes();
    };
    wrap.appendChild(btn);
  });
}

function renderRecipes() {
  const grid = document.getElementById('recipeGrid');
  grid.innerHTML = '<div class="no-results" id="noResults">No recipes match your search.</div>';

  RECIPES.forEach((r, i) => {
    scales[i] = scales[i] || 1;
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.dataset.idx = i;
    card.dataset.tags = r.tags.join(',').toLowerCase();
    card.dataset.title = r.title.toLowerCase();

    // Times
    const timesHtml = r.times.map(t =>
      `<div class="time-row${t.af ? ' af-row' : ''}">
        <span class="time-method">${t.af ? '🌬️ ' : ''}${t.method}</span>
        <span class="time-detail">${t.detail}</span>
      </div>`
    ).join('');

    // Ingredients
    const ingsHtml = r.ingredients.map((ing, ii) => {
      const scaledAmt = scaleAmount(ing.amount, scales[i]);
      return `<li>
        <span class="ing-amount" data-base="${ing.amount}" data-idx="${i}" data-ii="${ii}">${scaledAmt}</span>
        <span>${ing.item}</span>
      </li>`;
    }).join('');

    // Steps
    const stepsHtml = r.steps.map(s => `<li>${s}</li>`).join('');

    // Tags
    const tagsHtml = r.tags.map(t => `<span class="recipe-tag">${t}</span>`).join('');

    card.innerHTML = `
      <div class="recipe-title">${r.title}</div>
      <div class="cook-times">${timesHtml}</div>
      <div class="ingredients">
        <h4>Ingredients</h4>
        <div class="scale-row">
          <span class="scale-label">Servings:</span>
          <button class="scale-btn" onclick="changeScale(${i}, -1)">−</button>
          <span class="scale-display" id="scale-${i}">${scales[i]}×</span>
          <button class="scale-btn" onclick="changeScale(${i}, 1)">+</button>
        </div>
        <ul>${ingsHtml}</ul>
      </div>
      <div class="instructions">
        <h4>Instructions</h4>
        <ol>${stepsHtml}</ol>
      </div>
      <div class="recipe-tags">${tagsHtml}</div>
    `;

    grid.appendChild(card);
  });

  filterRecipes();
}

function scaleAmount(amount, scale) {
  if (!amount || scale === 1) return amount;
  // Replace numbers (including fractions like ½, ¼) with scaled versions
  return amount.replace(/(\d+\.?\d*)/g, (match) => {
    const n = parseFloat(match) * scale;
    return n % 1 === 0 ? n : parseFloat(n.toFixed(2));
  });
}

function changeScale(idx, delta) {
  scales[idx] = Math.max(1, (scales[idx] || 1) + delta);
  document.getElementById(`scale-${idx}`).textContent = `${scales[idx]}×`;
  // Update ingredient amounts
  const card = document.querySelector(`.recipe-card[data-idx="${idx}"]`);
  card.querySelectorAll('.ing-amount').forEach(el => {
    const base = el.dataset.base;
    el.textContent = scaleAmount(base, scales[idx]);
  });
}

function filterRecipes() {
  const q = searchQuery.toLowerCase();
  let visible = 0;
  document.querySelectorAll('.recipe-card').forEach(card => {
    const titleMatch = card.dataset.title.includes(q);
    const tagMatch = !activeTag || card.dataset.tags.includes(activeTag.toLowerCase());
    const show = titleMatch && tagMatch;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('noResults').classList.toggle('visible', visible === 0);
  document.getElementById('resultsBar').textContent = `${visible} recipe${visible !== 1 ? 's' : ''}`;
}

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  filterRecipes();
});

// Init
buildTagFilters();
renderRecipes();
</script>

</body>
